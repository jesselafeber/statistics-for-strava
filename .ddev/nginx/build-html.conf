# Route /files/ to storage/files directory (for photos, etc.)
location /files/ {
    alias /var/www/html/storage/files/;
}

# Route .html requests to the build/html directory
location ~ ^/(.+)\.html$ {
    alias /var/www/html/build/html/$1.html;
}

# Route activity pages
location ~ ^/activity/(.+)\.html$ {
    alias /var/www/html/build/html/activity/$1.html;
}

# Route month pages
location ~ ^/month/(.+)\.html$ {
    alias /var/www/html/build/html/month/$1.html;
}

# Route gear pages
location ~ ^/gear/(.+)\.html$ {
    alias /var/www/html/build/html/gear/$1.html;
}

# Route best-efforts pages
location ~ ^/best-efforts/(.+)\.html$ {
    alias /var/www/html/build/html/best-efforts/$1.html;
}

# Route fetch-json
location ~ ^/fetch-json/(.+)\.json$ {
    alias /var/www/html/build/html/fetch-json/$1.json;
}

# Route rewind pages
location ~ ^/rewind/(.+)\.html$ {
    alias /var/www/html/build/html/rewind/$1.html;
}
