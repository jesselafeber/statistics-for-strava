# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    env(APP_DEBUG): 0
    env(IMPORT_MODE): 'files'
    env(ADMIN_USERNAME): 'admin'
    env(ADMIN_PASSWORD_HASH): ''
    env(ADMIN_ALLOWED_IPS): ''
    env(STRAVA_CLIENT_ID): 'replace-me'
    env(STRAVA_CLIENT_SECRET): 'replace-me'
    env(STRAVA_REFRESH_TOKEN): 'replace-me'
    env(DEMO_MODE_IS_ENABLED): 0
    env(LOCK_DSN): 'flock'
    env(TZ): ''
    env(DATABASE_DIRECTORY): '%kernel.project_dir%/storage/database'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
    _instanceof:
        NeuronAI\Tools\ToolInterface:
            tags: [ 'app.ai_tool' ]

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    App\Controller\:
        resource: '../src/Controller/'
        tags: ['controller.service_arguments']

    App\Infrastructure\Http\ErrorResponseExceptionListener:
        tags:
            - { name: kernel.event_listener, event: kernel.exception }

    App\Infrastructure\KeyValue\KeyValueStore:
      class: App\Infrastructure\KeyValue\DbalKeyValueStore
      public: true

    App\Domain\Settings\SettingsRepository: '@App\Domain\Settings\CachingSettingsRepository'

    App\Infrastructure\ValueObject\String\KernelProjectDir:
        public: true
        factory: [ null, 'fromString' ]
        arguments: ['%kernel.project_dir%']

    App\Infrastructure\Config\PlatformEnvironment:
        public: true
        autoconfigure: false
        factory: [ null, 'fromServer' ]

    App\Infrastructure\ValueObject\Time\SerializableTimezone:
        factory: [ null, 'fromOptionalString' ]
        arguments: ['%env(string:TZ)%']

    App\Infrastructure\Config\AdminAllowedIpAddresses:
        factory: [ null, 'fromString' ]
        arguments: ['%env(string:ADMIN_ALLOWED_IPS)%']

    App\Infrastructure\Config\DemoMode:
        factory: [ null, 'fromString' ]
        arguments: ['%env(string:DEMO_MODE_IS_ENABLED)%']

    App\Infrastructure\Security\AdminUserName:
        factory: [ null, 'fromString' ]
        arguments: ['%env(string:ADMIN_USERNAME)%']

    App\Infrastructure\Security\AdminPasswordHash:
        factory: [ null, 'fromString' ]
        arguments: ['%env(string:ADMIN_PASSWORD_HASH)%']

    App\Application\AppUrl:
        factory: [ null, 'fromString' ]
        arguments: ['%env(string:APP_URL)%']

    NeuronAI\Agent\AgentInterface:
        class: App\Domain\Integration\AI\NeuronAIAgent

    NeuronAI\Chat\History\ChatHistoryInterface:
        class: App\Domain\Integration\AI\Chat\SFSChatHistory

    NeuronAI\Tools\Toolkits\ToolkitInterface:
        class: App\Domain\Integration\AI\Tool\Toolkit

    App\Domain\Strava\StravaClientId:
        factory: [ null, 'fromString' ]
        arguments: ['%env(string:STRAVA_CLIENT_ID)%']

    App\Domain\Strava\StravaClientSecret:
        factory: [ null, 'fromString' ]
        arguments: ['%env(string:STRAVA_CLIENT_SECRET)%']

    App\Domain\Strava\StravaRefreshToken:
        factory: [ null, 'fromString' ]
        arguments: ['%env(string:STRAVA_REFRESH_TOKEN)%']

    App\Domain\Import\ImportMode:
        public: true
        autoconfigure: false
        factory: [ null, 'from' ]
        arguments: ['%env(string:IMPORT_MODE)%']

    # Autowiring of vendor classes
    League\Flysystem\FilesystemOperator: '@default.storage'

    Linkin\Component\DoctrineNamingStrategy\ORM\Mapping\CamelCaseNamingStrategy:
      class: Linkin\Component\DoctrineNamingStrategy\ORM\Mapping\CamelCaseNamingStrategy

    GuzzleHttp\Client:
      class: GuzzleHttp\Client

    Money\MoneyFormatter:
        factory: '@App\Infrastructure\DependencyInjection\MoneyFormatterFactory'